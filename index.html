<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>四賤客小旅行 ・ 東北自駕</title>
  <meta name="theme-color" content="#2E4A3C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="四賤客小旅行">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-row">
        <div class="brand">
          <h1 id="brand-title">四賤客小旅行</h1>
          <div class="sub" id="brand-sub">東北自駕 ・ 6/21 – 6/29</div>
        </div>
        <button class="icon-btn" id="btn-overview" aria-label="切換 9 天總覽">⌗</button>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab" role="tab" data-view="day" aria-selected="true">每日行程</button>
        <button class="tab" role="tab" data-view="overview" aria-selected="false">9天總覽</button>
        <button class="tab" role="tab" data-view="food" aria-selected="false">全部餐廳</button>
        <button class="tab" role="tab" data-view="pocket" aria-selected="false">日文卡</button>
      </div>
    </header>

    <nav class="datestrip" id="datestrip" aria-label="日期切換"></nav>

    <main id="main"></main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
